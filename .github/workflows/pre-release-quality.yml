name: Pre-release Quality Gate (Manual)

on:
  workflow_dispatch:

jobs:
  quality:
    name: Pre-release quality gate
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup GDScript Toolkit
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install GDScript Toolkit
        run: pip install "gdtoolkit==4.5.0"

      - name: Check GDScript format
        working-directory: audio_resonance_tool
        run: gdformat --check addons/nexus_resonance/ test/

      - name: Lint GDScript
        working-directory: audio_resonance_tool
        run: gdlint addons/nexus_resonance/ test/

      - name: Setup Godot 4.6
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.6.0"
          use-dotnet: false

      - name: Import project
        run: godot --headless --path audio_resonance_tool --import
        env:
          GODOT_DISABLE_LEAK_CHECKS: 1

      - name: Run lightning smoke
        run: godot --headless --audio-driver Dummy --path audio_resonance_tool -s res://test/run_lightning_smoke.gd
        env:
          GODOT_DISABLE_LEAK_CHECKS: 1

      - name: Run method-track smoke
        run: godot --headless --audio-driver Dummy --path audio_resonance_tool -s res://test/run_resonance_method_track_smoke.gd
        env:
          GODOT_DISABLE_LEAK_CHECKS: 1

      - name: Run plain animation-audio smoke
        run: godot --headless --audio-driver Dummy --path audio_resonance_tool -s res://test/run_animation_audio_plain_smoke.gd
        env:
          GODOT_DISABLE_LEAK_CHECKS: 1

      - name: Run reverb-tail smoke
        run: godot --headless --audio-driver Dummy --path audio_resonance_tool -s res://test/run_reverb_tail_smoke.gd
        env:
          GODOT_DISABLE_LEAK_CHECKS: 1
