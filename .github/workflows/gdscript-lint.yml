name: GDScript Lint

on:
  push:
    branches: [main, master]
    paths:
      - 'audio_resonance_tool/addons/nexus_resonance/**/*.gd'
      - 'audio_resonance_tool/test/**/*.gd'
  pull_request:
    branches: [main, master]
    paths:
      - 'audio_resonance_tool/addons/nexus_resonance/**/*.gd'
      - 'audio_resonance_tool/test/**/*.gd'

jobs:
  lint:
    name: GDScript format & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: audio_resonance_tool

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed GDScript files
        id: changed
        uses: dorny/paths-filter@v4
        with:
          list-files: shell
          filters: |
            gd:
              - 'audio_resonance_tool/addons/nexus_resonance/**/*.gd'
              - 'audio_resonance_tool/test/**/*.gd'

      - name: Setup GDScript Toolkit
        uses: Scony/godot-gdscript-toolkit@4.5.0

      - name: Check GDScript format (changed files only)
        if: steps.changed.outputs.gd == 'true'
        env:
          GD_FILES: ${{ steps.changed.outputs.gd_files }}
        run: |
          eval "set -- $GD_FILES"
          for file in "$@"; do
            rel="${file#audio_resonance_tool/}"
            [ -n "$rel" ] && gdformat --check "$rel"
          done

      - name: Lint GDScript (changed files only)
        if: steps.changed.outputs.gd == 'true'
        env:
          GD_FILES: ${{ steps.changed.outputs.gd_files }}
        run: |
          eval "set -- $GD_FILES"
          for file in "$@"; do
            rel="${file#audio_resonance_tool/}"
            [ -n "$rel" ] && gdlint "$rel"
          done

      - name: Skip (no changed GDScript files)
        if: steps.changed.outputs.gd != 'true'
        run: echo "No GDScript changes detected; skipping lint."
